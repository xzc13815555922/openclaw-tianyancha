# 天眼查地址标注规则配置
# 修改此文件即可生效，无需修改 Python 代码
# 维护人：执行员小企

# ── 区县匹配规则 ──
# 注意：区县匹配逻辑在 annotate_all.py 中通过 SQL 实现（county 列判断）
# 此 YAML 仅维护街道/大楼宇的定义数据

# ── 街道匹配规则 ──
# street_name: 街道名称
# keywords: 在注册地址中匹配的关键词
# region: 该街道所属区域
streets:
  - name: 黄海街道
    keywords: [黄海街道]
    region: 盐南高新区
  - name: 新都街道
    keywords: [新都街道]
    region: 盐南高新区
  - name: 科城街道
    keywords: [科城街道]
    region: 盐南高新区
  - name: 新河街道
    keywords: [新河街道]
    region: 盐南高新区
  - name: 伍佑街道
    keywords: [伍佑街道]
    region: 盐南高新区
  - name: 新城街道
    keywords: [新城街道]
    region: 经开区
  - name: 步凤镇
    keywords: [步凤镇]
    region: 经开区

# ── 大楼宇匹配规则 ──
# name: 大楼宇名称
# keywords: 在注册地址中匹配的关键词
# region: 所在区县
# street: 所在街道
# street_cond: （可选）仅当 street 满足条件时匹配，如 "street=步凤镇"
# exclude_keywords: （可选）地址中含这些关键词时跳过匹配
